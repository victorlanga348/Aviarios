<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient for Primary Brand Color -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Gradient for Golden Accent Details (Beak, Comb) -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Gradient for Bird Body -->
    <linearGradient id="body-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6ee7b7" />
    </linearGradient>
  </defs>

  <!-- Rounded Premium Dark Background Shield -->
  <rect width="480" height="480" x="16" y="16" rx="120" fill="#0f172a" stroke="rgba(16, 185, 129, 0.15)" stroke-width="8" />

  <!-- Inner Soft Accent Border -->
  <rect width="456" height="456" x="28" y="28" rx="108" fill="none" stroke="url(#primary-grad)" stroke-width="4" opacity="0.35" />

  <!-- Stylized Chicken Vector Art -->
  <g transform="translate(56, 36)">
    <!-- Tail Feathers -->
    <path d="M 280 260 C 350 200, 390 140, 390 80 C 350 120, 320 180, 280 260 Z" fill="url(#primary-grad)" opacity="0.8" />
    <path d="M 290 280 C 370 240, 410 180, 410 120 C 370 160, 330 220, 290 280 Z" fill="url(#primary-grad)" opacity="0.4" />

    <!-- Comb (Crista) -->
    <path d="M 120 120 C 120 90, 140 70, 160 70 C 180 70, 190 90, 190 110 C 205 90, 225 90, 230 110 C 245 100, 260 110, 255 130 C 250 150, 230 160, 210 160 L 120 160 Z" fill="url(#accent-grad)" />

    <!-- Head & Body (Cabeça e Corpo) -->
    <path d="M 120 160 
             C 80 160, 50 200, 50 250 
             C 50 330, 110 390, 190 390 
             C 270 390, 320 330, 320 250 
             C 320 180, 280 160, 200 160 
             Z" 
          fill="url(#body-grad)" />

    <!-- Beak (Bico) -->
    <path d="M 54 220 L 12 235 L 50 255 Z" fill="url(#accent-grad)" />

    <!-- Elegant Glossy Wing (Asa) -->
    <path d="M 140 230 C 180 230, 260 270, 260 320 C 260 360, 200 360, 160 340 C 120 320, 120 260, 140 230 Z" fill="#ffffff" fill-opacity="0.22" />

    <!-- Eye (Olho) -->
    <circle cx="105" cy="210" r="12" fill="#0f172a" />
    <circle cx="109" cy="206" r="4" fill="#ffffff" />

    <!-- Wattles (Gogó/Barbelas) -->
    <path d="M 80 260 C 80 290, 100 300, 110 290 C 120 280, 110 260, 80 260 Z" fill="url(#accent-grad)" />
  </g>
</svg>